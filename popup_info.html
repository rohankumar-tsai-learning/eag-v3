<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            width: 300px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .header img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
        }
        .status-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .status-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }
        .roast-count {
            font-size: 24px;
            font-weight: 600;
            color: #a777e3;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icons/icon48.png" alt="Logo">
        <span class="title">Focus Bully</span>
    </div>
    <div class="status-card">
        <div class="status-text">Your Procrastination Level</div>
        <div class="roast-count">Moderate 🤨</div>
    </div>
    <div class="footer">
        "Get back to work before I get mean."
    </div>
</body>
</html>
